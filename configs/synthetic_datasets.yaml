# Scientific Synthetic Dataset Specifications

regression_sets:
  simple_linear:
    n_samples: 1000
    n_features: 1
    noise: 0.1
  high_dimensional:
    n_samples: 5000
    n_features: 50
    noise: 0.5
    bias: 10.0

classification_sets:
  binary_separable:
    n_samples: 2000
    n_features: 2
    n_classes: 2
    random_state: 42
  multiclass_complex:
    n_samples: 5000
    n_features: 20
    n_classes: 5
    n_clusters_per_class: 2

clustering_sets:
  blobs:
    n_samples: 1500
    centers: 4
    cluster_std: 0.60
  concentric_circles:
    n_samples: 1000
    factor: 0.5
    noise: 0.05
