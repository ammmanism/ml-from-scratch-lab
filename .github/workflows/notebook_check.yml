name: Notebook Check

on:
  push:
    branches: [ main ]
    paths:
      - 'notebooks/**/*.ipynb'
  pull_request:
    branches: [ main ]
    paths:
      - 'notebooks/**/*.ipynb'

jobs:
  check-notebooks:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install nbconvert nbformat ipykernel
        pip install -r requirements.txt
        pip install -e .
        python -m ipykernel install --user --name python3
        
    - name: Execute Notebooks
      run: |
        find notebooks/ -name "*.ipynb" -not -path "*/.ipynb_checkpoints/*" -print0 | xargs -0 -I {} jupyter nbconvert --to notebook --execute --inplace {}
