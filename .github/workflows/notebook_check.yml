name: Notebook Validation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  validate-notebooks:
    runs-on: ubuntu-latest
    
    steps:
    - uses: checkout@v3
    
    - name: Set up Python
      uses: setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install jupyter nbconvert
        pip install -e .

    - name: Execute Notebooks with Timeouts
      run: |
        find notebooks/ -name "*.ipynb" -not -path "*/.*" | xargs -I {} jupyter nbconvert --to notebook --execute --ExecutePreprocessor.timeout=600 "{}" || echo "Some notebooks failed execution"
